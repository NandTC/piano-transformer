<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano Transformer — UI Mockup v3</title>

  <style>
    /* ─────────────────────────────────────────────
       WEBVIEW REQUIRED — percentage height, no vh/vw
       ───────────────────────────────────────────── */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    /* ─────────────────────────────────────────────
       DESIGN TOKENS — Swiss Minimal
       ───────────────────────────────────────────── */
    :root {
      --bg:               #FFFFFF;
      --text-primary:     #000000;
      --text-secondary:   #666666;
      --text-muted:       #999999;
      --border:           #000000;
      --border-width:     2px;
      --btn-fill:         #000000;
      --btn-text:         #FFFFFF;
      --btn-disabled:     #CCCCCC;
      --slider-track:     #FFFFFF;
      --slider-thumb:     #000000;
      --edge:             28px;
      --gap:              20px;
    }

    /* ─────────────────────────────────────────────
       BODY — Native application feel
       ───────────────────────────────────────────── */
    body {
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
      overflow: hidden;
      background: #FFFFFF;
      font-family: Inter, "DM Sans", Helvetica, Arial, system-ui, sans-serif;
      color: var(--text-primary);
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    /* ─────────────────────────────────────────────
       APP SHELL — 640 × 560 fixed window
       ───────────────────────────────────────────── */
    .app-shell {
      width: 640px;
      height: 560px;
      background: var(--bg);
      position: relative;
      overflow: hidden;
      /* No shadows. No gradients. Proof of discipline. */
    }

    /* ─────────────────────────────────────────────
       INNER LAYOUT — padded content area
       ───────────────────────────────────────────── */
    .content {
      position: absolute;
      top: var(--edge);
      left: var(--edge);
      right: var(--edge);
      bottom: var(--edge);
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* ─────────────────────────────────────────────
       HEADER
       ───────────────────────────────────────────── */
    .header {
      flex-shrink: 0;
    }

    .header__title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text-primary);
      margin: 0 0 5px 0;
      letter-spacing: -0.01em;
    }

    .header__subtitle {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      margin: 0;
      line-height: 1;
    }

    /* ─────────────────────────────────────────────
       DROPZONE
       ───────────────────────────────────────────── */
    .dropzone {
      flex-shrink: 0;
      height: 60px;
      background: var(--bg);
      border: var(--border-width) solid var(--border);
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Inner dashed rectangle — 8px inset */
    .dropzone::before {
      content: "";
      position: absolute;
      top: 7px;
      left: 7px;
      right: 7px;
      bottom: 7px;
      border: 1px dashed #999999;
      pointer-events: none;
    }

    .dropzone__label {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-muted);
      pointer-events: none;
    }

    .dropzone__loaded {
      display: none;
      width: 100%;
      padding: 0 20px;
      align-items: center;
      justify-content: space-between;
    }

    .dropzone__filename {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-primary);
    }

    .dropzone__clear {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-primary);
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
      pointer-events: all;
      background: none;
      border: none;
      font-family: inherit;
    }

    .dropzone.drag-over {
      background: #F5F5F5;
    }

    .dropzone.is-loaded .dropzone__label {
      display: none;
    }

    .dropzone.is-loaded .dropzone__loaded {
      display: flex;
    }

    /* ─────────────────────────────────────────────
       CONTROLS — Slider rows
       ───────────────────────────────────────────── */
    .controls {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-row__meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .slider-row__label {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1;
    }

    .slider-row__value {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    /* ─────────────────────────────────────────────
       SLIDER — Swiss precision input
       The track is a box with 2px black border.
       The thumb is a black square. No border-radius.
       ───────────────────────────────────────────── */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 20px;
      background: var(--slider-track);
      border: var(--border-width) solid var(--border);
      outline: none;
      cursor: pointer;
      border-radius: 0;
      margin: 0;
      padding: 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 24px;
      background: var(--slider-thumb);
      border: none;
      border-radius: 0;
      cursor: pointer;
      margin-top: -4px;
    }

    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 24px;
      background: var(--slider-thumb);
      border: none;
      border-radius: 0;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 16px;
      background: transparent;
      border: none;
      border-radius: 0;
    }

    input[type="range"]::-moz-range-track {
      height: 16px;
      background: transparent;
      border: none;
      border-radius: 0;
    }

    /* ─────────────────────────────────────────────
       ACTION ROW — buttons
       ───────────────────────────────────────────── */
    .actions {
      flex-shrink: 0;
      display: flex;
      gap: 8px;
      height: 40px;
    }

    .btn {
      height: 40px;
      background: var(--btn-fill);
      color: var(--btn-text);
      border: none;
      border-radius: 0;
      font-family: inherit;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      letter-spacing: 0.02em;
      /* No transitions — instant state changes only */
    }

    .btn--play {
      flex: 0 0 102px;
    }

    .btn--generate {
      flex: 1 1 auto;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    .btn--download {
      flex: 0 0 194px;
      background: var(--btn-disabled);
      cursor: not-allowed;
    }

    .btn--download.is-active {
      background: var(--btn-fill);
      cursor: pointer;
    }

    /* ─────────────────────────────────────────────
       STATUS LINE
       ───────────────────────────────────────────── */
    .status {
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1;
      /* Sits at bottom of content area */
      margin-top: auto;
    }

    .status.is-active {
      color: var(--text-primary);
    }

  </style>
</head>
<body>

  <div class="app-shell">
    <div class="content">

      <!-- ── HEADER ── -->
      <header class="header">
        <h1 class="header__title">Piano Transformer</h1>
        <p class="header__subtitle">AI Piano MIDI Generator</p>
      </header>

      <!-- ── DROPZONE ── -->
      <div
        class="dropzone"
        id="dropzone"
        title="Click to select a seed MIDI file, or drag one here"
      >
        <span class="dropzone__label">Drop seed MIDI — optional</span>
        <div class="dropzone__loaded" id="dropzone-loaded">
          <span class="dropzone__filename" id="dropzone-filename"></span>
          <button class="dropzone__clear" id="dropzone-clear" title="Clear">×</button>
        </div>
      </div>

      <!-- ── CONTROLS ── -->
      <div class="controls">

        <!-- Temperature -->
        <div class="slider-row">
          <div class="slider-row__meta">
            <span class="slider-row__label">Temperature</span>
            <span class="slider-row__value" id="temperature-display">1.00</span>
          </div>
          <input
            type="range"
            id="temperature"
            min="0.1"
            max="2.0"
            step="0.01"
            value="1.0"
          />
        </div>

        <!-- Sequence Length -->
        <div class="slider-row">
          <div class="slider-row__meta">
            <span class="slider-row__label">Sequence Length</span>
            <span class="slider-row__value" id="sequence_length-display">512 steps</span>
          </div>
          <input
            type="range"
            id="sequence_length"
            min="128"
            max="2048"
            step="1"
            value="512"
          />
        </div>

        <!-- Primer Length -->
        <div class="slider-row">
          <div class="slider-row__meta">
            <span class="slider-row__label">Primer Length</span>
            <span class="slider-row__value" id="primer_length-display">64 steps</span>
          </div>
          <input
            type="range"
            id="primer_length"
            min="0"
            max="512"
            step="1"
            value="64"
          />
        </div>

        <!-- Tempo -->
        <div class="slider-row">
          <div class="slider-row__meta">
            <span class="slider-row__label">Tempo</span>
            <span class="slider-row__value" id="tempo-display">120 BPM</span>
          </div>
          <input
            type="range"
            id="tempo"
            min="40"
            max="200"
            step="1"
            value="120"
          />
        </div>

      </div>

      <!-- ── ACTIONS ── -->
      <div class="actions">
        <button class="btn btn--play" id="btn-play">Play</button>
        <button class="btn btn--generate" id="btn-generate">Generate</button>
        <button class="btn btn--download" id="btn-download" disabled>Download .mid</button>
      </div>

      <!-- ── STATUS ── -->
      <div class="status" id="status-line">Ready</div>

    </div>
  </div>

  <script>
    /* ──────────────────────────────────────────────────────────
       MOCK JUCE/ELECTRON BACKEND
       Simulates parameter state for browser testing.
    ────────────────────────────────────────────────────────── */
    window.Juce = {
      getSliderState: (id) => ({
        normalisedValue: 0.5,
        valueChangedEvent: {
          addListener: (fn) => console.log(`[Juce] Listener added for slider: ${id}`)
        },
        setNormalisedValue: (v) => console.log(`[Juce] ${id} → ${v}`)
      }),
      getToggleState: (id) => ({
        value: false,
        valueChangedEvent: {
          addListener: (fn) => console.log(`[Juce] Listener added for toggle: ${id}`)
        },
        setValue: (v) => console.log(`[Juce] ${id} → ${v}`)
      })
    };

    /* ──────────────────────────────────────────────────────────
       DISABLE CONTEXT MENU (required)
    ────────────────────────────────────────────────────────── */
    document.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      return false;
    });

    /* ──────────────────────────────────────────────────────────
       SLIDER BINDINGS
    ────────────────────────────────────────────────────────── */
    document.addEventListener("DOMContentLoaded", () => {

      // ── Temperature ──
      const temperatureSlider  = document.getElementById("temperature");
      const temperatureDisplay = document.getElementById("temperature-display");
      const temperatureState   = Juce.getSliderState("temperature");

      temperatureSlider.addEventListener("input", (e) => {
        const v = parseFloat(e.target.value).toFixed(2);
        temperatureDisplay.textContent = v;
        temperatureState.setNormalisedValue(
          (parseFloat(e.target.value) - 0.1) / (2.0 - 0.1)
        );
      });

      temperatureState.valueChangedEvent.addListener((v) => {
        const raw = 0.1 + v * (2.0 - 0.1);
        temperatureSlider.value = raw;
        temperatureDisplay.textContent = raw.toFixed(2);
      });

      // ── Sequence Length ──
      const seqLenSlider  = document.getElementById("sequence_length");
      const seqLenDisplay = document.getElementById("sequence_length-display");
      const seqLenState   = Juce.getSliderState("sequence_length");

      seqLenSlider.addEventListener("input", (e) => {
        const v = parseInt(e.target.value, 10);
        seqLenDisplay.textContent = `${v} steps`;
        seqLenState.setNormalisedValue((v - 128) / (2048 - 128));
      });

      seqLenState.valueChangedEvent.addListener((v) => {
        const raw = Math.round(128 + v * (2048 - 128));
        seqLenSlider.value = raw;
        seqLenDisplay.textContent = `${raw} steps`;
      });

      // ── Primer Length ──
      const primerSlider  = document.getElementById("primer_length");
      const primerDisplay = document.getElementById("primer_length-display");
      const primerState   = Juce.getSliderState("primer_length");

      primerSlider.addEventListener("input", (e) => {
        const v = parseInt(e.target.value, 10);
        primerDisplay.textContent = `${v} steps`;
        primerState.setNormalisedValue(v / 512);
      });

      primerState.valueChangedEvent.addListener((v) => {
        const raw = Math.round(v * 512);
        primerSlider.value = raw;
        primerDisplay.textContent = `${raw} steps`;
      });

      // ── Tempo ──
      const tempoSlider  = document.getElementById("tempo");
      const tempoDisplay = document.getElementById("tempo-display");
      const tempoState   = Juce.getSliderState("tempo");

      tempoSlider.addEventListener("input", (e) => {
        const v = parseInt(e.target.value, 10);
        tempoDisplay.textContent = `${v} BPM`;
        tempoState.setNormalisedValue((v - 40) / (200 - 40));
      });

      tempoState.valueChangedEvent.addListener((v) => {
        const raw = Math.round(40 + v * (200 - 40));
        tempoSlider.value = raw;
        tempoDisplay.textContent = `${raw} BPM`;
      });

      /* ──────────────────────────────────────────────────────────
         DROPZONE BEHAVIOR
      ────────────────────────────────────────────────────────── */
      const dropzone         = document.getElementById("dropzone");
      const dropzoneFilename = document.getElementById("dropzone-filename");
      const dropzoneClear    = document.getElementById("dropzone-clear");

      function loadFile(name) {
        dropzoneFilename.textContent = name;
        dropzone.classList.add("is-loaded");
        console.log(`[Dropzone] Loaded: ${name}`);
      }

      function clearFile() {
        dropzoneFilename.textContent = "";
        dropzone.classList.remove("is-loaded");
        console.log("[Dropzone] Cleared");
      }

      dropzone.addEventListener("click", (e) => {
        if (e.target === dropzoneClear) return;
        // Fake file pick in browser context
        const fakeName = "seed-melody.mid";
        loadFile(fakeName);
      });

      dropzoneClear.addEventListener("click", (e) => {
        e.stopPropagation();
        clearFile();
      });

      dropzone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropzone.classList.add("drag-over");
      });

      dropzone.addEventListener("dragleave", () => {
        dropzone.classList.remove("drag-over");
      });

      dropzone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropzone.classList.remove("drag-over");
        const file = e.dataTransfer.files[0];
        if (file) {
          loadFile(file.name);
        }
      });

      /* ──────────────────────────────────────────────────────────
         PLAY TOGGLE
      ────────────────────────────────────────────────────────── */
      const btnPlay   = document.getElementById("btn-play");
      let isPlaying   = false;

      btnPlay.addEventListener("click", () => {
        isPlaying = !isPlaying;
        btnPlay.textContent = isPlaying ? "Stop" : "Play";
        console.log(`[Transport] ${isPlaying ? "Playing" : "Stopped"}`);
      });

      /* ──────────────────────────────────────────────────────────
         GENERATE — progress simulation
      ────────────────────────────────────────────────────────── */
      const btnGenerate = document.getElementById("btn-generate");
      const btnDownload = document.getElementById("btn-download");
      const statusLine  = document.getElementById("status-line");

      let isGenerating = false;

      btnGenerate.addEventListener("click", () => {
        if (isGenerating) return;
        isGenerating = true;

        // Disable download while generating
        btnDownload.classList.remove("is-active");
        btnDownload.disabled = true;
        btnDownload.style.background = "";

        const durationMs = 3000;
        const intervalMs = 50;
        const steps = durationMs / intervalMs;
        let step = 0;

        statusLine.textContent = "Generating… 0%";
        statusLine.classList.add("is-active");

        const interval = setInterval(() => {
          step++;
          const pct = Math.round((step / steps) * 100);
          statusLine.textContent = `Generating… ${pct}%`;

          if (step >= steps) {
            clearInterval(interval);
            isGenerating = false;

            statusLine.textContent = "Complete";

            // Activate download
            btnDownload.disabled = false;
            btnDownload.classList.add("is-active");
            btnDownload.style.background = "#000000";

            console.log("[Generate] Complete — download enabled");
          }
        }, intervalMs);

        console.log("[Generate] Started");
      });

      /* ──────────────────────────────────────────────────────────
         DOWNLOAD — mock action
      ────────────────────────────────────────────────────────── */
      btnDownload.addEventListener("click", () => {
        if (btnDownload.disabled) return;
        console.log("[Download] Triggered — would save piano-transformer-output.mid");
        statusLine.textContent = "Saved: piano-transformer-output.mid";
      });

    }); // DOMContentLoaded
  </script>

</body>
</html>
