<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PianoTransformer — UI Mockup v1</title>

  <style>
    /* ─────────────────────────────────────────────
       WEBVIEW REQUIRED: percentage height, no vh/vw
       ───────────────────────────────────────────── */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    /* ─────────────────────────────────────────────
       DESIGN TOKENS — Vintage Hardware Palette
       ───────────────────────────────────────────── */
    :root {
      --bg-dark:        #2a1a0a;
      --bg-mid:         #4a3a2a;
      --bg-very-dark:   #1a0a00;
      --bg-surface:     #3a2a1a;
      --accent-brass-light: #d4a574;
      --accent-brass:       #c49564;
      --accent-brass-dark:  #a08050;
      --text-primary:   #c49564;
      --text-dim:       #7a6050;
      --text-bright:    #e8c894;
      --shadow-heavy:   rgba(0,0,0,0.8);
      --brass-glow:     rgba(212,165,116,0.4);
      --scan-line:      rgba(0,0,0,0.03);
      --border-inset:   rgba(0,0,0,0.6);
      --border-raised:  rgba(212,165,116,0.18);
    }

    /* ─────────────────────────────────────────────
       BODY — Native application feel
       ───────────────────────────────────────────── */
    body {
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
      overflow: hidden;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text-primary);

      /* Warm brown radial gradient background */
      background:
        radial-gradient(ellipse at 50% 0%, #4a2a08 0%, #1a0a00 68%),
        #1a0a00;
    }

    /* ─────────────────────────────────────────────
       APP SHELL — Fixed 680×580 window
       ───────────────────────────────────────────── */
    .app-shell {
      width: 680px;
      height: 580px;
      position: relative;
      overflow: hidden;
      background: var(--bg-dark);

      /* Layered shadows for 3D depth */
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.9),
        0 4px 32px rgba(0,0,0,0.9),
        0 1px 0 rgba(212,165,116,0.12) inset,
        0 -1px 0 rgba(0,0,0,0.5) inset;
    }

    /* Scan-line overlay — entire app surface */
    .app-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        var(--scan-line) 0px,
        var(--scan-line) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Radial vignette at edges */
    .app-shell::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse at 50% 50%,
        transparent 55%,
        rgba(0,0,0,0.55) 100%
      );
      pointer-events: none;
      z-index: 101;
    }

    /* ─────────────────────────────────────────────
       HEADER
       ───────────────────────────────────────────── */
    .header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding-top: 4px;

      /* Subtle top separator */
      border-bottom: 1px solid rgba(196,149,100,0.14);
      background: linear-gradient(
        to bottom,
        rgba(74,42,8,0.5) 0%,
        transparent 100%
      );
    }

    .header-title {
      font-size: 17px;
      font-weight: 200;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--accent-brass-light);
      text-shadow:
        0 0 20px rgba(212,165,116,0.5),
        0 1px 0 rgba(0,0,0,0.8);
      margin: 0;
      padding-right: 0.45em; /* optical kerning compensation */
    }

    .header-subtitle {
      font-size: 9.5px;
      font-weight: 400;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 8px 0 0 0;
      padding-right: 0.38em;
      opacity: 0.85;
    }

    /* ─────────────────────────────────────────────
       DROPZONE — Seed MIDI Input
       ───────────────────────────────────────────── */
    .dropzone-section {
      position: absolute;
      top: 90px;
      left: 30px;
      right: 30px;
      height: 76px;
    }

    .dropzone {
      width: 100%;
      height: 76px;
      background: var(--bg-very-dark);
      border: 1.5px dashed rgba(196,149,100,0.45);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition:
        border-color 0.15s ease,
        background 0.15s ease,
        box-shadow 0.15s ease;

      box-shadow:
        inset 0 2px 10px rgba(0,0,0,0.65),
        inset 0 0 0 1px rgba(0,0,0,0.4),
        0 1px 0 rgba(196,149,100,0.08);
    }

    .dropzone:hover,
    .dropzone.drag-over {
      border-color: rgba(212,165,116,0.8);
      background: rgba(26,10,0,0.8);
      box-shadow:
        inset 0 2px 10px rgba(0,0,0,0.65),
        inset 0 0 0 1px rgba(0,0,0,0.4),
        0 0 12px rgba(212,165,116,0.18),
        0 1px 0 rgba(196,149,100,0.12);
    }

    .dropzone-empty-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }

    .dropzone-icon {
      width: 18px;
      height: 14px;
      position: relative;
      opacity: 0.55;
    }

    /* Simple MIDI file icon via CSS */
    .dropzone-icon::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 16px;
      border: 1.5px solid var(--accent-brass);
      border-radius: 1px;
      top: -1px;
      left: 2px;
    }
    .dropzone-icon::after {
      content: "";
      position: absolute;
      width: 5px;
      height: 5px;
      background: var(--bg-very-dark);
      border-left: 1.5px solid var(--accent-brass);
      border-bottom: 1.5px solid var(--accent-brass);
      top: -1px;
      right: 2px;
    }

    .dropzone-text {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding-right: 0.32em;
    }

    /* Loaded state */
    .dropzone-loaded {
      display: none;
      width: 100%;
      padding: 0 18px;
      align-items: center;
      justify-content: space-between;
    }

    .dropzone-filename {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: var(--accent-brass-light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 530px;
    }

    .dropzone-filename::before {
      content: "MIDI  ";
      font-size: 8px;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      margin-right: 8px;
    }

    .dropzone-clear {
      width: 22px;
      height: 22px;
      background: rgba(196,149,100,0.1);
      border: 1px solid rgba(196,149,100,0.3);
      border-radius: 2px;
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.12s ease;
    }

    .dropzone-clear:hover {
      background: rgba(196,149,100,0.22);
      border-color: rgba(212,165,116,0.6);
      color: var(--accent-brass-light);
    }

    .dropzone.is-loaded .dropzone-empty-label {
      display: none;
    }
    .dropzone.is-loaded .dropzone-loaded {
      display: flex;
    }

    /* ─────────────────────────────────────────────
       SECTION DIVIDER
       ───────────────────────────────────────────── */
    .divider {
      position: absolute;
      left: 30px;
      right: 30px;
      height: 1px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(196,149,100,0.22) 20%,
        rgba(196,149,100,0.22) 80%,
        transparent
      );
    }

    /* ─────────────────────────────────────────────
       CONTROLS ROW — 4 sliders
       ───────────────────────────────────────────── */
    .controls-section {
      position: absolute;
      top: 186px;
      left: 30px;
      right: 30px;
      height: 160px;
    }

    .controls-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      height: 100%;
      align-items: center;
    }

    .control-column {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .control-label {
      font-size: 8.5px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-align: center;
      padding-right: 0.3em;
      white-space: nowrap;
    }

    /* Custom slider track + thumb */
    .control-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: transparent;
      outline: none;
      cursor: pointer;
      position: relative;
    }

    /* Track */
    .control-slider::-webkit-slider-runnable-track {
      height: 4px;
      background: var(--bg-very-dark);
      border-radius: 2px;
      box-shadow:
        inset 0 1px 3px rgba(0,0,0,0.9),
        inset 0 0 0 1px rgba(0,0,0,0.5),
        0 1px 0 rgba(196,149,100,0.1);
    }

    /* Thumb — brass gradient */
    .control-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 22px;
      margin-top: -9px;
      border-radius: 2px;
      cursor: grab;
      background: linear-gradient(
        to bottom,
        #e8c894 0%,
        #c49564 35%,
        #a07040 65%,
        #c49564 100%
      );
      box-shadow:
        0 1px 4px rgba(0,0,0,0.7),
        0 0 0 1px rgba(0,0,0,0.5),
        0 1px 0 rgba(255,255,255,0.12) inset;
      transition: box-shadow 0.1s ease;
    }

    .control-slider::-webkit-slider-thumb:hover {
      box-shadow:
        0 1px 4px rgba(0,0,0,0.7),
        0 0 0 1px rgba(0,0,0,0.5),
        0 0 8px rgba(212,165,116,0.55),
        0 1px 0 rgba(255,255,255,0.12) inset;
    }

    .control-slider::-webkit-slider-thumb:active {
      cursor: grabbing;
      box-shadow:
        0 1px 4px rgba(0,0,0,0.7),
        0 0 0 1px rgba(0,0,0,0.5),
        0 0 14px rgba(212,165,116,0.75),
        0 1px 0 rgba(255,255,255,0.12) inset;
    }

    .control-value {
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--accent-brass-light);
      text-align: center;
      font-variant-numeric: tabular-nums;
      min-width: 48px;
      text-shadow: 0 0 10px rgba(212,165,116,0.35);
    }

    .control-unit {
      font-size: 7px;
      letter-spacing: 0.28em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-left: 3px;
    }

    /* ─────────────────────────────────────────────
       ACTION ROW
       ───────────────────────────────────────────── */
    .action-section {
      position: absolute;
      top: 378px;
      left: 30px;
      right: 30px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    /* ── Play / Stop transport ── */
    .btn-transport {
      width: 120px;
      height: 44px;
      background: var(--bg-surface);
      border: 1px solid rgba(196,149,100,0.25);
      border-radius: 3px;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-shrink: 0;
      transition: all 0.12s ease;

      box-shadow:
        0 2px 6px rgba(0,0,0,0.5),
        0 1px 0 rgba(196,149,100,0.08) inset,
        0 -1px 0 rgba(0,0,0,0.4) inset;
    }

    .btn-transport:hover {
      border-color: rgba(196,149,100,0.45);
      color: var(--text-primary);
      background: rgba(58,42,26,0.9);
    }

    .btn-transport:active {
      box-shadow:
        0 1px 2px rgba(0,0,0,0.5),
        0 -1px 0 rgba(196,149,100,0.08) inset,
        0 1px 0 rgba(0,0,0,0.4) inset;
      transform: translateY(1px);
    }

    /* Play triangle icon */
    .transport-icon {
      width: 0;
      height: 0;
      border-style: solid;
      flex-shrink: 0;
      transition: all 0.12s ease;
    }

    .transport-icon.play-icon {
      border-width: 6px 0 6px 10px;
      border-color: transparent transparent transparent currentColor;
    }

    /* Stop square icon */
    .transport-icon.stop-icon {
      width: 10px;
      height: 10px;
      background: currentColor;
      border: none;
    }

    .btn-transport.is-playing {
      color: var(--accent-brass-light);
      border-color: rgba(212,165,116,0.4);
      box-shadow:
        0 2px 6px rgba(0,0,0,0.5),
        0 0 10px rgba(212,165,116,0.15),
        0 1px 0 rgba(196,149,100,0.08) inset,
        0 -1px 0 rgba(0,0,0,0.4) inset;
    }

    /* ── Generate — primary CTA ── */
    .btn-generate {
      flex: 1;
      height: 52px;
      background: linear-gradient(
        to bottom,
        #d4a574 0%,
        #c49564 40%,
        #a07840 70%,
        #b88a50 100%
      );
      border: 1px solid rgba(0,0,0,0.5);
      border-radius: 3px;
      color: #1a0a00;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.12s ease;

      box-shadow:
        0 3px 12px rgba(0,0,0,0.6),
        0 1px 0 rgba(255,255,255,0.18) inset,
        0 -2px 0 rgba(0,0,0,0.35) inset,
        0 0 20px rgba(212,165,116,0.2);

      text-shadow: 0 1px 0 rgba(255,255,255,0.25);
    }

    /* Inner highlight line */
    .btn-generate::before {
      content: "";
      position: absolute;
      top: 1px;
      left: 10%;
      right: 10%;
      height: 1px;
      background: rgba(255,255,255,0.25);
      border-radius: 1px;
    }

    .btn-generate:hover {
      background: linear-gradient(
        to bottom,
        #e8c080 0%,
        #d4a574 40%,
        #b08848 70%,
        #c89858 100%
      );
      box-shadow:
        0 3px 12px rgba(0,0,0,0.6),
        0 1px 0 rgba(255,255,255,0.18) inset,
        0 -2px 0 rgba(0,0,0,0.35) inset,
        0 0 28px rgba(212,165,116,0.4);
    }

    .btn-generate:active {
      box-shadow:
        0 1px 4px rgba(0,0,0,0.6),
        0 -1px 0 rgba(255,255,255,0.18) inset,
        0 2px 0 rgba(0,0,0,0.35) inset,
        0 0 16px rgba(212,165,116,0.25);
      transform: translateY(1px);
    }

    .btn-generate.is-generating {
      cursor: not-allowed;
      opacity: 0.75;
      pointer-events: none;
    }

    /* ── Download button ── */
    .btn-download {
      width: 160px;
      height: 44px;
      background: var(--bg-surface);
      border: 1px solid rgba(196,149,100,0.2);
      border-radius: 3px;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 8.5px;
      font-weight: 400;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      cursor: not-allowed;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      flex-shrink: 0;
      opacity: 0.45;
      transition: all 0.2s ease;

      box-shadow:
        0 2px 6px rgba(0,0,0,0.4),
        0 1px 0 rgba(196,149,100,0.06) inset;
    }

    .btn-download.is-active {
      cursor: pointer;
      opacity: 1;
      color: var(--accent-brass);
      border-color: rgba(196,149,100,0.4);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.5),
        0 0 12px rgba(212,165,116,0.12),
        0 1px 0 rgba(196,149,100,0.08) inset;
    }

    .btn-download.is-active:hover {
      border-color: rgba(212,165,116,0.65);
      color: var(--accent-brass-light);
      box-shadow:
        0 2px 8px rgba(0,0,0,0.5),
        0 0 18px rgba(212,165,116,0.22),
        0 1px 0 rgba(196,149,100,0.08) inset;
    }

    .btn-download.is-active:active {
      transform: translateY(1px);
    }

    /* Download arrow icon */
    .download-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }
    .download-icon::before {
      content: "";
      width: 8px;
      height: 8px;
      border-left: 1.5px solid currentColor;
      border-bottom: 1.5px solid currentColor;
      transform: rotate(-45deg) translateY(-2px);
      display: block;
    }
    .download-icon::after {
      content: "";
      width: 1.5px;
      height: 6px;
      background: currentColor;
      display: block;
      margin-top: -3px;
    }

    /* ─────────────────────────────────────────────
       STATUS BAR
       ───────────────────────────────────────────── */
    .status-section {
      position: absolute;
      top: 474px;
      left: 30px;
      right: 30px;
      height: 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-indicator {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-dim);
      box-shadow: 0 0 4px transparent;
      transition: all 0.3s ease;
    }

    .status-indicator.is-ready {
      background: rgba(196,149,100,0.6);
      box-shadow: 0 0 5px rgba(196,149,100,0.3);
    }

    .status-indicator.is-generating {
      background: var(--accent-brass-light);
      box-shadow: 0 0 8px rgba(212,165,116,0.7);
      animation: pulse-indicator 0.9s ease-in-out infinite;
    }

    .status-indicator.is-complete {
      background: #a8d080;
      box-shadow: 0 0 6px rgba(168,208,128,0.5);
    }

    @keyframes pulse-indicator {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(212,165,116,0.7); }
      50%       { opacity: 0.55; box-shadow: 0 0 4px rgba(212,165,116,0.3); }
    }

    .status-text {
      font-size: 9.5px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding-right: 0.3em;
      transition: color 0.2s ease;
    }

    .status-text.is-active {
      color: var(--accent-brass);
    }

    .status-text.is-complete {
      color: #a8d080;
    }

    /* Progress bar */
    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--bg-very-dark);
      border-radius: 2px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;

      box-shadow:
        inset 0 1px 2px rgba(0,0,0,0.8),
        0 1px 0 rgba(196,149,100,0.08);
    }

    .progress-track.is-visible {
      opacity: 1;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(
        to right,
        var(--accent-brass-dark),
        var(--accent-brass-light)
      );
      border-radius: 2px;
      transition: width 0.08s linear;
      box-shadow: 0 0 6px rgba(212,165,116,0.5);
    }

    /* ─────────────────────────────────────────────
       BOTTOM EDGE DETAIL — Decorative hardware strip
       ───────────────────────────────────────────── */
    .bottom-strip {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(
        to right,
        transparent,
        rgba(196,149,100,0.15) 15%,
        rgba(196,149,100,0.3) 50%,
        rgba(196,149,100,0.15) 85%,
        transparent
      );
    }

    /* ─────────────────────────────────────────────
       SECTION LABELS — Small uppercase markers
       ───────────────────────────────────────────── */
    .section-label {
      font-size: 7.5px;
      font-weight: 400;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--text-dim);
      opacity: 0.7;
      padding-right: 0.32em;
    }

    .section-header {
      position: absolute;
      left: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-header::after {
      content: "";
      height: 1px;
      width: 40px;
      background: rgba(196,149,100,0.18);
    }

    /* ─────────────────────────────────────────────
       CORNER ACCENTS — hardware detail
       ───────────────────────────────────────────── */
    .corner-accent {
      position: absolute;
      width: 10px;
      height: 10px;
    }

    .corner-accent.tl { top: 10px; left: 10px; border-top: 1px solid rgba(196,149,100,0.3); border-left: 1px solid rgba(196,149,100,0.3); }
    .corner-accent.tr { top: 10px; right: 10px; border-top: 1px solid rgba(196,149,100,0.3); border-right: 1px solid rgba(196,149,100,0.3); }
    .corner-accent.bl { bottom: 14px; left: 10px; border-bottom: 1px solid rgba(196,149,100,0.3); border-left: 1px solid rgba(196,149,100,0.3); }
    .corner-accent.br { bottom: 14px; right: 10px; border-bottom: 1px solid rgba(196,149,100,0.3); border-right: 1px solid rgba(196,149,100,0.3); }
  </style>
</head>

<body>
  <!-- ─────────────────────────────────────────
       APP SHELL — 680 × 580
       ───────────────────────────────────────── -->
  <div class="app-shell">

    <!-- Corner accents — hardware detail -->
    <div class="corner-accent tl"></div>
    <div class="corner-accent tr"></div>
    <div class="corner-accent bl"></div>
    <div class="corner-accent br"></div>

    <!-- ── HEADER ── -->
    <div class="header">
      <div class="header-title">Piano Transformer</div>
      <div class="header-subtitle">AI Piano MIDI Generator</div>
    </div>

    <!-- ── SEED MIDI DROPZONE ── -->
    <div class="dropzone-section">

      <div class="section-header" style="top: -16px; position: absolute; left: 0;">
        <span class="section-label">Seed MIDI</span>
      </div>

      <div class="dropzone" id="dropzone">
        <!-- Empty state -->
        <div class="dropzone-empty-label">
          <div class="dropzone-icon"></div>
          <span class="dropzone-text">Drop Seed MIDI &nbsp;—&nbsp; Optional Primer</span>
        </div>

        <!-- Loaded state -->
        <div class="dropzone-loaded" id="dropzone-loaded">
          <span class="dropzone-filename" id="dropzone-filename">example-primer.mid</span>
          <button class="dropzone-clear" id="dropzone-clear" title="Remove file">&#215;</button>
        </div>
      </div>
    </div>

    <!-- DIVIDER -->
    <div class="divider" style="top: 182px;"></div>

    <!-- ── CONTROLS ── -->
    <div class="controls-section">

      <div class="section-header" style="position: absolute; top: -18px; left: 0;">
        <span class="section-label">Parameters</span>
      </div>

      <div class="controls-row">

        <!-- Temperature -->
        <div class="control-column">
          <span class="control-label">Temperature</span>
          <input
            type="range"
            class="control-slider"
            id="slider-temperature"
            min="0.1"
            max="2.0"
            step="0.01"
            value="1.0"
          />
          <span class="control-value" id="val-temperature">1.00</span>
        </div>

        <!-- Sequence Length -->
        <div class="control-column">
          <span class="control-label">Sequence Length</span>
          <input
            type="range"
            class="control-slider"
            id="slider-sequence_length"
            min="128"
            max="2048"
            step="1"
            value="512"
          />
          <span class="control-value" id="val-sequence_length">512</span>
        </div>

        <!-- Primer Length -->
        <div class="control-column">
          <span class="control-label">Primer Length</span>
          <input
            type="range"
            class="control-slider"
            id="slider-primer_length"
            min="0"
            max="512"
            step="1"
            value="64"
          />
          <span class="control-value" id="val-primer_length">64</span>
        </div>

        <!-- Tempo -->
        <div class="control-column">
          <span class="control-label">Tempo</span>
          <input
            type="range"
            class="control-slider"
            id="slider-tempo"
            min="40"
            max="200"
            step="1"
            value="120"
          />
          <span class="control-value" id="val-tempo">120 <span class="control-unit">BPM</span></span>
        </div>

      </div>
    </div>

    <!-- DIVIDER -->
    <div class="divider" style="top: 374px;"></div>

    <!-- ── ACTION ROW ── -->
    <div class="action-section">

      <!-- Play / Stop transport -->
      <button class="btn-transport" id="btn-transport">
        <div class="transport-icon play-icon" id="transport-icon"></div>
        <span id="transport-label">PLAY</span>
      </button>

      <!-- Generate — primary CTA -->
      <button class="btn-generate" id="btn-generate">
        GENERATE
      </button>

      <!-- Download .MID -->
      <button class="btn-download" id="btn-download" disabled>
        <div class="download-icon"></div>
        DOWNLOAD .MID
      </button>

    </div>

    <!-- DIVIDER -->
    <div class="divider" style="top: 470px;"></div>

    <!-- ── STATUS BAR ── -->
    <div class="status-section">
      <div class="status-row">
        <div class="status-indicator is-ready" id="status-indicator"></div>
        <span class="status-text is-active" id="status-text">READY</span>
      </div>
      <div class="progress-track" id="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- Bottom decorative strip -->
    <div class="bottom-strip"></div>

  </div><!-- /.app-shell -->

  <script>
    "use strict";

    // ─────────────────────────────────────────
    // Disable context menu (REQUIRED for WebView)
    // ─────────────────────────────────────────
    document.addEventListener("contextmenu", function(e) {
      e.preventDefault();
      return false;
    });

    // ─────────────────────────────────────────
    // Mock JUCE backend — for browser testing
    // (Simulates the Electron/WebView IPC layer)
    // ─────────────────────────────────────────
    window.Juce = {
      getSliderState: function(id) {
        var listeners = [];
        return {
          normalisedValue: 0.5,
          setNormalisedValue: function(v) {
            listeners.forEach(function(fn) { fn(v); });
          },
          valueChangedEvent: {
            addListener: function(fn) {
              listeners.push(fn);
              console.log("[Juce] Slider listener registered: " + id);
            }
          }
        };
      },
      getToggleState: function(id) {
        return {
          value: false,
          valueChangedEvent: {
            addListener: function(fn) {
              console.log("[Juce] Toggle listener registered: " + id);
            }
          }
        };
      },
      getComboBoxState: function(id) {
        return {
          selectedId: 0,
          valueChangedEvent: {
            addListener: function(fn) {
              console.log("[Juce] Combo listener registered: " + id);
            }
          }
        };
      }
    };

    // ─────────────────────────────────────────
    // APP STATE
    // ─────────────────────────────────────────
    var AppState = {
      seededFile: null,
      isPlaying: false,
      isGenerating: false,
      isGenerated: false,
      parameters: {
        temperature:     { value: 1.0,  min: 0.1,  max: 2.0,  step: 0.01, precision: 2, unit: ""    },
        sequence_length: { value: 512,  min: 128,  max: 2048, step: 1,    precision: 0, unit: ""    },
        primer_length:   { value: 64,   min: 0,    max: 512,  step: 1,    precision: 0, unit: ""    },
        tempo:           { value: 120,  min: 40,   max: 200,  step: 1,    precision: 0, unit: "BPM" }
      }
    };

    // ─────────────────────────────────────────
    // ELEMENT REFERENCES
    // ─────────────────────────────────────────
    var elements = {
      dropzone:         document.getElementById("dropzone"),
      dropzoneFilename: document.getElementById("dropzone-filename"),
      dropzoneClear:    document.getElementById("dropzone-clear"),
      btnTransport:     document.getElementById("btn-transport"),
      transportIcon:    document.getElementById("transport-icon"),
      transportLabel:   document.getElementById("transport-label"),
      btnGenerate:      document.getElementById("btn-generate"),
      btnDownload:      document.getElementById("btn-download"),
      statusIndicator:  document.getElementById("status-indicator"),
      statusText:       document.getElementById("status-text"),
      progressTrack:    document.getElementById("progress-track"),
      progressFill:     document.getElementById("progress-fill"),
    };

    // ─────────────────────────────────────────
    // SLIDER BINDINGS
    // ─────────────────────────────────────────
    var paramKeys = ["temperature", "sequence_length", "primer_length", "tempo"];

    paramKeys.forEach(function(id) {
      var slider   = document.getElementById("slider-" + id);
      var valEl    = document.getElementById("val-" + id);
      var param    = AppState.parameters[id];
      var state    = window.Juce.getSliderState(id);

      if (!slider || !valEl) return;

      function formatValue(v) {
        var formatted = parseFloat(v).toFixed(param.precision);
        if (param.unit) {
          return formatted + " <span class=\"control-unit\">" + param.unit + "</span>";
        }
        return formatted;
      }

      // Initialize display
      valEl.innerHTML = formatValue(param.value);

      // Input event — immediate hardware-like response
      slider.addEventListener("input", function(e) {
        var raw = parseFloat(e.target.value);
        param.value = raw;

        // Normalise to 0–1 for Juce
        var norm = (raw - param.min) / (param.max - param.min);
        valEl.innerHTML = formatValue(raw);
        state.setNormalisedValue(norm);

        console.log("[Param] " + id + " = " + raw + " (normalised: " + norm.toFixed(4) + ")");
      });

      // Backend pushes value to UI
      state.valueChangedEvent.addListener(function(normV) {
        var raw = param.min + normV * (param.max - param.min);
        slider.value = raw;
        param.value  = raw;
        valEl.innerHTML = formatValue(raw);
      });
    });

    // ─────────────────────────────────────────
    // DROPZONE — Drag and drop
    // ─────────────────────────────────────────
    function loadFile(name) {
      AppState.seededFile = name;
      elements.dropzoneFilename.textContent = name;
      elements.dropzone.classList.add("is-loaded");
      console.log("[Dropzone] Loaded: " + name);
    }

    function clearFile() {
      AppState.seededFile = null;
      elements.dropzone.classList.remove("is-loaded");
      console.log("[Dropzone] Cleared");
    }

    elements.dropzone.addEventListener("dragover", function(e) {
      e.preventDefault();
      e.stopPropagation();
      elements.dropzone.classList.add("drag-over");
    });

    elements.dropzone.addEventListener("dragleave", function(e) {
      elements.dropzone.classList.remove("drag-over");
    });

    elements.dropzone.addEventListener("drop", function(e) {
      e.preventDefault();
      e.stopPropagation();
      elements.dropzone.classList.remove("drag-over");

      var files = e.dataTransfer.files;
      if (files.length === 0) return;

      var file = files[0];
      var name = file.name;

      // Accept .mid and .midi only
      if (!name.match(/\.(mid|midi)$/i)) {
        setStatus("ERROR — MIDI files only (.mid, .midi)", "error");
        return;
      }

      loadFile(name);
    });

    // Click to trigger file picker (browser mockup only)
    elements.dropzone.addEventListener("click", function(e) {
      if (AppState.seededFile) return; // Don't re-open if loaded
      // Simulate picking a file
      var fakeName = "jazz-primer-" + Math.floor(Math.random() * 900 + 100) + ".mid";
      loadFile(fakeName);
    });

    elements.dropzoneClear.addEventListener("click", function(e) {
      e.stopPropagation();
      clearFile();
    });

    // ─────────────────────────────────────────
    // STATUS MANAGEMENT
    // ─────────────────────────────────────────
    function setStatus(message, state) {
      var ind  = elements.statusIndicator;
      var text = elements.statusText;

      ind.className  = "status-indicator";
      text.className = "status-text";

      if (state === "ready") {
        ind.classList.add("is-ready");
        text.classList.add("is-active");
      } else if (state === "generating") {
        ind.classList.add("is-generating");
        text.classList.add("is-active");
      } else if (state === "complete") {
        ind.classList.add("is-complete");
        text.classList.add("is-complete");
      } else if (state === "error") {
        // Use dim styling for error
      }

      text.textContent = message;
    }

    // ─────────────────────────────────────────
    // GENERATE BUTTON — 3 second fake inference
    // ─────────────────────────────────────────
    elements.btnGenerate.addEventListener("click", function() {
      if (AppState.isGenerating) return;

      AppState.isGenerating = true;
      AppState.isGenerated  = false;

      // Update UI state
      elements.btnGenerate.classList.add("is-generating");
      elements.btnGenerate.textContent = "GENERATING...";
      elements.btnDownload.classList.remove("is-active");
      elements.btnDownload.disabled = true;

      setStatus("GENERATING...", "generating");

      // Show progress bar
      elements.progressTrack.classList.add("is-visible");
      elements.progressFill.style.width = "0%";

      // Simulate inference progress over 3 seconds
      var startTime    = Date.now();
      var totalMs      = 3000;
      var rafHandle    = null;

      // Non-linear progress curve — fast start, slow finish (authentic ML feel)
      function easeProgress(t) {
        // t: 0–1 linear time → output: 0–1 visual progress
        // Fast to ~75%, then slows dramatically (simulates model inference)
        if (t < 0.7) {
          return (t / 0.7) * 0.78;
        } else {
          return 0.78 + ((t - 0.7) / 0.3) * 0.15;
        }
        // Jumps to 100% on complete
      }

      function animate() {
        var elapsed  = Date.now() - startTime;
        var tLinear  = Math.min(elapsed / totalMs, 1.0);
        var progress = easeProgress(tLinear) * 100;

        elements.progressFill.style.width = progress.toFixed(1) + "%";

        if (tLinear < 1.0) {
          rafHandle = requestAnimationFrame(animate);
        } else {
          // Completion
          elements.progressFill.style.width = "100%";

          setTimeout(function() {
            AppState.isGenerating = false;
            AppState.isGenerated  = true;

            elements.btnGenerate.classList.remove("is-generating");
            elements.btnGenerate.textContent = "GENERATE";

            // Enable download
            elements.btnDownload.classList.add("is-active");
            elements.btnDownload.disabled = false;

            // Update status
            setStatus("COMPLETE  —  " + AppState.parameters.sequence_length.value + " TOKENS", "complete");

            // Fade progress bar after brief hold
            setTimeout(function() {
              elements.progressTrack.classList.remove("is-visible");
              setTimeout(function() {
                elements.progressFill.style.width = "0%";
              }, 300);
            }, 1200);

            console.log("[Generate] Complete.");
          }, 180);
        }
      }

      rafHandle = requestAnimationFrame(animate);
      console.log("[Generate] Started. Temp=" + AppState.parameters.temperature.value +
                  " Len=" + AppState.parameters.sequence_length.value);
    });

    // ─────────────────────────────────────────
    // PLAY / STOP TRANSPORT
    // ─────────────────────────────────────────
    elements.btnTransport.addEventListener("click", function() {
      AppState.isPlaying = !AppState.isPlaying;

      if (AppState.isPlaying) {
        elements.btnTransport.classList.add("is-playing");
        elements.transportIcon.className = "transport-icon stop-icon";
        elements.transportLabel.textContent = "STOP";
        if (AppState.isGenerated) {
          setStatus("PLAYING  —  " + AppState.parameters.tempo.value + " BPM", "generating");
        }
        console.log("[Transport] Play");
      } else {
        elements.btnTransport.classList.remove("is-playing");
        elements.transportIcon.className = "transport-icon play-icon";
        elements.transportLabel.textContent = "PLAY";
        if (AppState.isGenerated) {
          setStatus("COMPLETE  —  " + AppState.parameters.sequence_length.value + " TOKENS", "complete");
        } else {
          setStatus("READY", "ready");
        }
        console.log("[Transport] Stop");
      }
    });

    // ─────────────────────────────────────────
    // DOWNLOAD BUTTON
    // ─────────────────────────────────────────
    elements.btnDownload.addEventListener("click", function() {
      if (!AppState.isGenerated) return;

      var filename = "piano-transformer-" + Date.now() + ".mid";
      setStatus("EXPORTED  —  " + filename, "complete");
      console.log("[Download] Exported: " + filename);

      // Visual feedback — brief flash
      elements.btnDownload.style.borderColor = "rgba(212,165,116,0.8)";
      setTimeout(function() {
        elements.btnDownload.style.borderColor = "";
      }, 400);
    });

    // ─────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", function() {
      setStatus("READY", "ready");
      console.log("[PianoTransformer] UI Mockup v1 initialized");
      console.log("[PianoTransformer] Window: 680 × 580  |  Aesthetic: Vintage Hardware");
    });
  </script>
</body>
</html>
